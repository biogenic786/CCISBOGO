server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "${LAVALINK_PASSWORD}"
    sources:
      youtube: true
      soundcloud: true
      twitch: true
      bandcamp: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      timescale: true
      tremolo: true
      distortion: true

plugins:
  - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
    repository: "https://maven.lavalink.dev/releases"
  - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.4"
    repository: "https://maven.lavalink.dev/releases"

pluginsConfig:
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      appleMusic: false
      deezer: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

  youtube:
    enabled: true
    oauth:
      enabled: false

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  level:
    root: INFO
    lavalink: INFO
